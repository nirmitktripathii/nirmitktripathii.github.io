<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Disease Classifier - Nirmit K. Tripathii</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #0a0a12; color: #fff; font-family: 'DM Sans', sans-serif; }
        .container { max-width: 800px; margin: 100px auto; padding: 40px; background: rgba(255,255,255,0.05); border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .upload-section { margin-bottom: 30px; text-align: center; }
        .drop-zone { border: 2px dashed rgba(255,255,255,0.2); padding: 50px; text-align: center; border-radius: 15px; cursor: pointer; transition: 0.3s; background: rgba(255,255,255,0.02); }
        .drop-zone:hover { border-color: var(--accent); background: rgba(0,255,136,0.05); }
        .btn-predict { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--accent); color: #fff; cursor: pointer; font-weight: 700; font-size: 1.1rem; transition: 0.3s; }
        .btn-predict:disabled { opacity: 0.5; cursor: not-allowed; }
        .result-card { margin-top: 40px; text-align: center; display: none; padding: 30px; background: rgba(255,255,255,0.03); border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .prediction-label { font-size: 2rem; font-weight: 700; color: var(--accent2); margin: 15px 0; text-transform: capitalize; }
        .back-btn { display: inline-block; margin-bottom: 20px; color: var(--accent); text-decoration: none; }
        #previewImage { max-width: 100%; max-height: 300px; border-radius: 10px; margin-top: 20px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← Back to Portfolio</a>
        <div class="header">
            <h2>Plant Disease Classifier</h2>
            <p>Upload a leaf image to diagnose potential diseases using Deep Learning (CNN).</p>
        </div>
        
        <div class="upload-section">
            <div class="drop-zone" id="dropZone">
                <i class="fas fa-cloud-upload-alt" style="font-size: 3rem; margin-bottom: 15px;"></i>
                <p>Click or Drag & Drop Leaf Image</p>
                <input type="file" id="imageInput" hidden accept="image/*">
                <img id="previewImage" alt="Preview">
            </div>
        </div>
        
        <button class="btn-predict" id="predictBtn" onclick="runPrediction()">Identify Disease</button>
        
        <div class="result-card" id="resultCard">
            <h3>Diagnosis Result</h3>
            <div class="prediction-label" id="predictionValue">Healthy</div>
            <p id="predictionDetails">Our model is 98% confident in this diagnosis.</p>
        </div>
    </div>

    <script>
        const API_URL = 'https://nirmitk-plant-disease-api.hf.space/predict';

        const imageInput = document.getElementById('imageInput');
        const dropZone = document.getElementById('dropZone');
        const previewImage = document.getElementById('previewImage');
        const predictBtn = document.getElementById('predictBtn');
        const resultCard = document.getElementById('resultCard');
        const predictionValue = document.getElementById('predictionValue');

        dropZone.onclick = () => imageInput.click();

        imageInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    previewImage.src = e.target.result;
                    previewImage.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        };

        async function runPrediction() {
            const file = imageInput.files[0];
            if (!file) {
                alert("Please upload an image first.");
                return;
            }

            try {
                predictBtn.disabled = true;
                predictBtn.innerText = "Analyzing...";
                resultCard.style.display = 'none';

                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async () => {
                    const base64Image = reader.result.split(',')[1];
                    
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: base64Image })
                    });
                    
                    const data = await response.json();
                    
                    resultCard.style.display = 'block';
                    if (data && data[0] && data[0].image) {
                        const label = data[0].image.replace(/__/g, ' - ').replace(/_/g, ' ');
                        predictionValue.innerText = label;
                    } else {
                        predictionValue.innerText = "Unknown Error";
                    }
                    
                    predictBtn.disabled = false;
                    predictBtn.innerText = "Identify Disease";
                };
            } catch (error) {
                alert("Error connecting to API");
                predictBtn.disabled = false;
                predictBtn.innerText = "Identify Disease";
            }
        }
    </script>
</body>
</html>
