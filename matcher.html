<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Matcher - Nirmit K. Tripathii</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #0a0a12; color: #fff; font-family: 'DM Sans', sans-serif; }
        .container { max-width: 800px; margin: 100px auto; padding: 40px; background: rgba(255,255,255,0.05); border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .upload-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .drop-zone { border: 2px dashed rgba(255,255,255,0.2); padding: 30px; text-align: center; border-radius: 15px; cursor: pointer; transition: 0.3s; }
        .drop-zone:hover { border-color: var(--accent); background: rgba(0,255,136,0.05); }
        .btn-match { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--accent); color: #fff; cursor: pointer; font-weight: 700; font-size: 1.1rem; }
        .result-card { margin-top: 40px; text-align: center; display: none; }
        .score-circle { width: 150px; height: 150px; border-radius: 50%; border: 8px solid var(--accent); display: flex; align-items: center; justify-content: center; margin: 20px auto; font-size: 2.5rem; font-weight: 700; }
        .back-btn { display: inline-block; margin-bottom: 20px; color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← Back to Portfolio</a>
        <div class="header">
            <h2>AI Resume Matcher</h2>
            <p>Compare your CV with a Job Description using DistilBERT Embeddings.</p>
        </div>
        
        <div class="upload-section">
            <div class="drop-zone" id="resumeZone">
                <i class="fas fa-file-pdf"></i>
                <p>Upload Resume (PDF)</p>
                <input type="file" id="resumeInput" hidden accept=".pdf">
            </div>
            <div class="drop-zone" id="jdZone">
                <i class="fas fa-file-alt"></i>
                <p>Upload Job Description (PDF)</p>
                <input type="file" id="jdInput" hidden accept=".pdf">
            </div>
        </div>
        
        <button class="btn-match" onclick="runMatch()">Calculate Match Score</button>
        
        <div class="result-card" id="resultCard">
            <h3>Match Results</h3>
            <div class="score-circle" id="scoreValue">85%</div>
            <p id="scoreMessage">Great match! Your skills strongly align with this role.</p>
        </div>
    </div>

    <script>
        const API_URL = 'YOUR_CLOUD_RUN_URL/match'; // Replace with your deployed API URL

        async function runMatch() {
            const resumeFile = document.getElementById('resumeInput').files[0];
            const jdFile = document.getElementById('jdInput').files[0];
            const resultCard = document.getElementById('resultCard');
            const scoreValue = document.getElementById('scoreValue');
            const scoreMessage = document.getElementById('scoreMessage');

            if (!resumeFile || !jdFile) {
                alert("Please upload both Resume and Job Description.");
                return;
            }

            if (API_URL === 'YOUR_CLOUD_RUN_URL/match') {
                // Demo mode logic
                resultCard.style.display = 'block';
                const mockScore = Math.floor(Math.random() * 40) + 60;
                scoreValue.innerText = mockScore + "%";
                scoreMessage.innerText = "Demo Mode: Connect your API to see real analysis.";
                return;
            }

            try {
                scoreValue.innerText = "...";
                resultCard.style.display = 'block';

                const formData = new FormData();
                formData.append('resume', resumeFile);
                formData.append('jd', jdFile);

                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.status === 'success') {
                    const score = Math.round(data.match_score * 100);
                    scoreValue.innerText = score + "%";
                    if (score > 80) {
                        scoreValue.style.borderColor = "#00ff88";
                        scoreMessage.innerText = "Excellent match! Your profile is highly compatible.";
                    } else if (score > 60) {
                        scoreValue.style.borderColor = "#ffd700";
                        scoreMessage.innerText = "Good match. Some areas for optimization found.";
                    } else {
                        scoreValue.style.borderColor = "#ff2d6b";
                        scoreMessage.innerText = "Lower compatibility. Consider tailoring your resume.";
                    }
                } else {
                    scoreValue.innerText = "Error";
                    scoreMessage.innerText = data.error || "Failed to process files.";
                }
            } catch (error) {
                scoreValue.innerText = "Error";
                scoreMessage.innerText = "Could not connect to API.";
                console.error(error);
            }
        }

        // Handle file inputs
        document.getElementById('resumeZone').onclick = () => document.getElementById('resumeInput').click();
        document.getElementById('jdZone').onclick = () => document.getElementById('jdInput').click();
    </script>
</body>
</html>
