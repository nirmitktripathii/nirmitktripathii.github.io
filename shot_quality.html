<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shot Quality xG Predictor - Nirmit K. Tripathii</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root { --accent: #00ff88; --accent2: #ff2d6b; --grass: #1a3c1a; }
        body { background: #05050a; color: #fff; font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
        .container { max-width: 1000px; margin: 40px auto; padding: 40px; background: rgba(255,255,255,0.02); border-radius: 30px; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        .pitch-wrapper { position: relative; width: 100%; aspect-ratio: 100/64; margin: 30px 0; border-radius: 12px; overflow: hidden; border: 4px solid rgba(255,255,255,0.1); }
        .pitch-container { position: relative; width: 100%; height: 100%; background: var(--grass); background-image: repeating-linear-gradient(90deg, rgba(255,255,255,0.03) 0, rgba(255,255,255,0.03) 5%, transparent 5%, transparent 10%); cursor: crosshair; }
        
        /* Pitch Markings */
        .pitch-lines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; border: 2px solid rgba(255,255,255,0.4); }
        .half-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: rgba(255,255,255,0.4); }
        .center-circle { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 18.3%; aspect-ratio: 1; border: 2px solid rgba(255,255,255,0.4); border-radius: 50%; }
        .penalty-area { position: absolute; right: 0; top: 20%; bottom: 20%; width: 15.4%; border: 2px solid rgba(255,255,255,0.4); border-right: none; }
        .goal-area { position: absolute; right: 0; top: 37%; bottom: 37%; width: 5.5%; border: 2px solid rgba(255,255,255,0.4); border-right: none; }
        .goal-post { position: absolute; right: -2px; top: 41.5%; bottom: 41.5%; width: 4px; background: #fff; box-shadow: 0 0 20px #fff; border-radius: 2px; }
        
        /* Heatmap Layer */
        #heatmapCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.6; mix-blend-mode: screen; }
        
        .marker { position: absolute; width: 16px; height: 16px; background: #fff; border: 3px solid var(--accent); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 20px var(--accent); display: none; z-index: 10; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        .dashboard { display: grid; grid-template-columns: 1fr 300px; gap: 30px; margin-top: 30px; }
        .controls { background: rgba(255,255,255,0.03); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 10px; font-size: 0.9rem; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 1px; }
        select { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: #0f0f1a; color: #fff; font-size: 1rem; appearance: none; }
        
        .btn-predict { width: 100%; padding: 18px; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--accent), #00ccff); color: #000; cursor: pointer; font-weight: 800; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,255,136,0.2); }
        .btn-predict:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,255,136,0.4); }
        
        .results { display: flex; flex-direction: column; gap: 20px; }
        .stat-card { padding: 25px; background: rgba(255,255,255,0.03); border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); position: relative; overflow: hidden; }
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--accent); }
        .stat-label { font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-bottom: 10px; text-transform: uppercase; }
        .stat-value { font-size: 3rem; font-weight: 800; line-height: 1; }
        .prediction-badge { display: inline-block; padding: 8px 16px; border-radius: 50px; font-size: 0.9rem; font-weight: 700; margin-top: 10px; }
        
        .back-btn { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 30px; color: rgba(255,255,255,0.6); text-decoration: none; font-weight: 500; transition: 0.3s; }
        .back-btn:hover { color: var(--accent); }
        
        .coord-display { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--accent); margin-top: 10px; opacity: 0.8; }
        
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.1); opacity: 0.8; } 100% { transform: scale(1); opacity: 0.6; } }
        .goal-highlight { position: absolute; right: 0; top: 40%; transform: translateY(-50%); width: 100px; height: 100px; background: radial-gradient(circle, rgba(0,255,136,0.2) 0%, transparent 70%); pointer-events: none; animation: pulse 2s infinite; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>
        <div class="header">
            <h1 style="font-size: 2.5rem; margin-bottom: 10px;">Shot Quality (xG) Predictor</h1>
            <p style="color: rgba(255,255,255,0.6);">Interactive Machine Learning model to evaluate expected goals probability.</p>
        </div>

        <div class="pitch-wrapper">
            <div class="pitch-container" id="pitch">
                <canvas id="heatmapCanvas"></canvas>
                <div class="pitch-lines">
                    <div class="half-line"></div>
                    <div class="center-circle"></div>
                    <div class="penalty-area"></div>
                    <div class="goal-area"></div>
                    <div class="goal-post"></div>
                </div>
                <div class="goal-highlight"></div>
                <div class="marker" id="marker"></div>
            </div>
        </div>

        <div class="dashboard">
            <div class="controls">
                <div class="input-group">
                    <label>Selected Location</label>
                    <div class="coord-display">X: <span id="valX">--</span> | Y: <span id="valY">--</span> (Standard 100x100 Grid)</div>
                </div>
                <div class="input-group">
                    <label>Body Part / Shot Type</label>
                    <div style="position: relative;">
                        <select id="shotType">
                            <option value="RightFoot">Right Foot (Strong)</option>
                            <option value="LeftFoot">Left Foot (Weak)</option>
                            <option value="Head">Header</option>
                            <option value="OtherBodyPart">Other (Volley/Deflection)</option>
                        </select>
                    </div>
                </div>
                <button class="btn-predict" id="predictBtn" onclick="calculateXG()">Predict xG Probability</button>
            </div>

            <div class="results" id="resultSection">
                <div class="stat-card">
                    <div class="stat-label">Expected Goals (xG)</div>
                    <div class="stat-value" id="xgValue">--</div>
                    <p style="font-size: 0.9rem; margin-top: 10px; color: rgba(255,255,255,0.4);">Statistical scoring probability</p>
                </div>
                <div class="stat-card" style="--accent: var(--accent2)">
                    <div class="stat-label">Outcome Prediction</div>
                    <div class="stat-value" id="predValue" style="font-size: 2rem;">--</div>
                    <div class="prediction-badge" id="predBadge">Waiting for shot...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://kit.fontawesome.com/your-code.js" crossorigin="anonymous"></script>
    <script>
        const API_URL = 'https://nirmitk-shot-quality-api.hf.space/predict';
        const pitch = document.getElementById('pitch');
        const marker = document.getElementById('marker');
        const canvas = document.getElementById('heatmapCanvas');
        const ctx = canvas.getContext('2d');
        const valX = document.getElementById('valX');
        const valY = document.getElementById('valY');
        
        let selectedX = null;
        let selectedY = null;

        // Initialize Heatmap
        function initHeatmap() {
            canvas.width = pitch.clientWidth;
            canvas.height = pitch.clientHeight;
            
            // Draw "Golden Zones" (Statistical high-xG areas)
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 1. The "6-Yard Box" Prime Zone
            const primeZone = ctx.createRadialGradient(
                canvas.width, canvas.height/2, 0,
                canvas.width, canvas.height/2, canvas.width * 0.15
            );
            primeZone.addColorStop(0, 'rgba(0, 255, 136, 0.5)');
            primeZone.addColorStop(1, 'rgba(0, 255, 136, 0)');
            
            ctx.fillStyle = primeZone;
            ctx.fillRect(canvas.width * 0.8, 0, canvas.width * 0.2, canvas.height);

            // 2. Penalty Spot Highlight
            ctx.beginPath();
            ctx.arc(canvas.width * 0.885, canvas.height * 0.5, 30, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(0, 255, 136, 0.2)';
            ctx.fill();
        }

        window.onload = initHeatmap;
        window.onresize = initHeatmap;

        pitch.addEventListener('click', (e) => {
            const rect = pitch.getBoundingClientRect();
            // Standardizing coordinates to 100x100
            // Origin (0,0) is bottom-left of the target goal side? 
            // Model training says: dist = sqrt((100-x)^2 + (50-y)^2)
            // This means Goal is at (100, 50).
            // So X=0 is far left, X=100 is far right (goal line).
            // Y=0 is top, Y=100 is bottom (or vice versa).
            
            const x = ((e.clientX - rect.left) / rect.width) * 100;
            const y = ((e.clientY - rect.top) / rect.height) * 100;
            
            selectedX = x.toFixed(1);
            selectedY = y.toFixed(1);
            
            marker.style.left = x + '%';
            marker.style.top = y + '%';
            marker.style.display = 'block';
            
            valX.innerText = selectedX;
            valY.innerText = selectedY;
            
            // Subtle click effect on canvas
            ctx.beginPath();
            ctx.arc((x/100)*canvas.width, (y/100)*canvas.height, 10, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fill();
        });

        async function calculateXG() {
            if (selectedX === null) {
                alert("Please click on the pitch to select a shot location.");
                return;
            }
            
            const shotType = document.getElementById('shotType').value;
            const predictBtn = document.getElementById('predictBtn');
            const xgValue = document.getElementById('xgValue');
            const predValue = document.getElementById('predValue');
            const predBadge = document.getElementById('predBadge');

            try {
                predictBtn.disabled = true;
                predictBtn.innerText = "Analyzing Trajectory...";
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        x: selectedX,
                        y: selectedY,
                        shot_type: shotType
                    })
                });
                
                const data = await response.json();
                
                const xg = data.shot_quality;
                xgValue.innerText = xg.toFixed(3);
                
                if (data.goal_prediction === 1) {
                    predValue.innerText = "GOAL";
                    predBadge.innerText = "High Probability Chance";
                    predBadge.style.background = "rgba(0, 255, 136, 0.2)";
                    predBadge.style.color = "var(--accent)";
                } else {
                    predValue.innerText = "NO GOAL";
                    predBadge.innerText = "Low Probability Shot";
                    predBadge.style.background = "rgba(255, 45, 107, 0.2)";
                    predBadge.style.color = "var(--accent2)";
                }
                
                // Visualization update: marker color based on xG
                marker.style.background = xg > 0.3 ? "var(--accent)" : (xg > 0.1 ? "#ffcc00" : "var(--accent2)");
                
            } catch (error) {
                console.error(error);
                alert("API Connection Error. Please ensure the Hugging Face Space is active.");
            } finally {
                predictBtn.disabled = false;
                predictBtn.innerText = "Predict xG Probability";
            }
        }
    </script>
</body>
</html>
