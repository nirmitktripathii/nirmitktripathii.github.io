<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Weather Dashboard - Nirmit K. Tripathii</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        body { 
            background: radial-gradient(circle at top right, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            color: #fff;
            font-family: 'Inter', sans-serif;
            transition: background 1s ease;
        }
        .container { max-width: 800px; margin: 60px auto; padding: 20px; text-align: center; }
        
        .search-box {
            display: flex;
            gap: 10px;
            max-width: 500px;
            margin: 0 auto 40px;
        }
        input {
            flex: 1;
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 15px 25px;
            border-radius: 50px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            backdrop-filter: blur(10px);
        }
        .btn-search {
            background: #4ecca3;
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            color: #1a1a2e;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-search:hover { transform: scale(1.1); background: #fff; }

        .weather-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 50px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            display: none;
            animation: slideUp 0.6s ease-out forwards;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .temp-display { font-size: 6rem; font-weight: 800; margin: 20px 0; }
        .city-name { font-size: 2.5rem; font-weight: 300; opacity: 0.8; }
        .weather-desc { font-size: 1.5rem; text-transform: capitalize; color: #4ecca3; }
        
        .details-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 40px;
            border-top: 1px solid var(--border);
            padding-top: 40px;
        }
        .detail-item {
            background: rgba(255,255,255,0.03);
            padding: 20px;
            border-radius: 20px;
        }
        .detail-item i { font-size: 1.5rem; margin-bottom: 10px; color: #4ecca3; }
        .detail-item p { font-size: 0.9rem; opacity: 0.6; margin-bottom: 5px; }
        .detail-item span { font-weight: 600; font-size: 1.2rem; }

        .loader { display: none; border: 4px solid var(--glass); border-top: 4px solid #4ecca3; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="margin-bottom: 30px; font-weight: 300;">World Weather <span style="font-weight: 800; color: #4ecca3;">Insights</span></h1>
        
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name..." onkeypress="handleKey(event)">
            <button class="btn-search" onclick="getWeather()"><i class="fas fa-search"></i></button>
        </div>

        <div class="loader" id="loader"></div>

        <div class="weather-card" id="weatherCard">
            <div class="city-name" id="city">London</div>
            <div class="weather-desc" id="description">Sunny</div>
            <div class="temp-display"><span id="temp">24</span>°C</div>
            
            <div class="details-grid">
                <div class="detail-item">
                    <i class="fas fa-droplet"></i>
                    <p>Humidity</p>
                    <span id="humidity">45%</span>
                </div>
                <div class="detail-item">
                    <i class="fas fa-wind"></i>
                    <p>Wind Speed</p>
                    <span id="wind">12 km/h</span>
                </div>
                <div class="detail-item">
                    <i class="fas fa-compress-arrows-alt"></i>
                    <p>Pressure</p>
                    <span id="pressure">1012 hPa</span>
                </div>
            </div>
        </div>
        
        <p id="errorMsg" style="color: #ff4d4d; margin-top: 20px; display: none;"></p>
        
        <a href="index.html" style="display: inline-block; margin-top: 40px; color: #fff; text-decoration: none; opacity: 0.5;">
            <i class="fas fa-arrow-left"></i> Back to Portfolio
        </a>
    </div>

    <script>
        const API_URL = 'https://nirmitk-weather-proxy-api.hf.space/weather';

        async function getWeather() {
            const city = document.getElementById('cityInput').value;
            if (!city) return;

            const loader = document.getElementById('loader');
            const card = document.getElementById('weatherCard');
            const errorMsg = document.getElementById('errorMsg');

            loader.style.display = 'block';
            card.style.display = 'none';
            errorMsg.style.display = 'none';

            try {
                const response = await fetch(`${API_URL}?city=${city}`);
                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error);
                }

                document.getElementById('city').innerText = data.name + ', ' + data.sys.country;
                document.getElementById('temp').innerText = Math.round(data.main.temp);
                document.getElementById('description').innerText = data.weather[0].description;
                document.getElementById('humidity').innerText = data.main.humidity + '%';
                document.getElementById('wind').innerText = data.wind.speed + ' m/s';
                document.getElementById('pressure').innerText = data.main.pressure + ' hPa';

                card.style.display = 'block';
                updateBackground(data.weather[0].main);

            } catch (err) {
                errorMsg.innerText = err.message || 'Connection failed';
                errorMsg.style.display = 'block';
            } finally {
                loader.style.display = 'none';
            }
        }

        function updateBackground(weather) {
            const body = document.body;
            const themes = {
                'Clear': 'radial-gradient(circle at top right, #ff9a9e, #fad0c4)',
                'Clouds': 'radial-gradient(circle at top right, #373b44, #4286f4)',
                'Rain': 'radial-gradient(circle at top right, #1e3c72, #2a5298)',
                'Snow': 'radial-gradient(circle at top right, #83a4d4, #b6fbff)',
                'Thunderstorm': 'radial-gradient(circle at top right, #0f0c29, #302b63, #24243e)'
            };
            body.style.background = themes[weather] || 'radial-gradient(circle at top right, #1a1a2e, #16213e, #0f3460)';
        }

        function handleKey(e) {
            if (e.key === 'Enter') getWeather();
        }
        
        // Auto-load a city
        window.onload = () => {
            document.getElementById('cityInput').value = 'Mumbai';
            getWeather();
        };
    </script>
</body>
</html>
