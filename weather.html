<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard - Nirmit K. Tripathii</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #0a0a12; color: #fff; font-family: 'DM Sans', sans-serif; }
        .container { max-width: 800px; margin: 100px auto; padding: 40px; background: rgba(255,255,255,0.05); border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .search-box { display: flex; gap: 10px; margin-bottom: 30px; }
        input { flex: 1; padding: 12px 20px; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: #fff; }
        button { padding: 12px 24px; border-radius: 10px; border: none; background: var(--accent); color: #fff; cursor: pointer; font-weight: 600; }
        .weather-info { text-align: center; }
        .temp { font-size: 4rem; font-weight: 700; margin: 20px 0; color: var(--accent2); }
        .city { font-size: 2rem; margin-bottom: 10px; }
        .desc { font-size: 1.2rem; opacity: 0.8; }
        .back-btn { display: inline-block; margin-bottom: 20px; color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← Back to Portfolio</a>
        <div class="weather-info">
            <h2 class="city" id="cityName">Enter a City</h2>
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Search city...">
                <button onclick="getWeather()">Search</button>
            </div>
            <div id="weatherContent" style="display:none;">
                <div class="temp" id="temperature">--°C</div>
                <div class="desc" id="description">Cloudy</div>
                <div class="details" style="display:flex; justify-content: space-around; margin-top: 40px;">
                    <div><i class="fas fa-tint"></i> Humidity: <span id="humidity">--%</span></div>
                    <div><i class="fas fa-wind"></i> Wind: <span id="wind">-- km/h</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // REPLACE THIS WITH YOUR OPENWEATHERMAP API KEY
        const API_KEY = 'YOUR_OPENWEATHERMAP_API_KEY';

        async function getWeather() {
            const cityInput = document.getElementById('cityInput');
            const city = cityInput.value.trim();
            if (!city) return;
            
            const weatherContent = document.getElementById('weatherContent');
            const cityName = document.getElementById('cityName');
            const temperature = document.getElementById('temperature');
            const description = document.getElementById('description');
            const humidity = document.getElementById('humidity');
            const wind = document.getElementById('wind');

            if (API_KEY === 'YOUR_OPENWEATHERMAP_API_KEY') {
                // Mock logic for demonstration if no API key
                weatherContent.style.display = 'block';
                cityName.innerText = city + " (Demo Mode)";
                temperature.innerText = "24°C";
                description.innerText = "Sunny";
                humidity.innerText = "45%";
                wind.innerText = "12 km/h";
                return;
            }

            try {
                cityName.innerText = "Loading...";
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${API_KEY}`);
                const data = await response.json();

                if (data.cod === 200) {
                    weatherContent.style.display = 'block';
                    cityName.innerText = data.name + ", " + data.sys.country;
                    temperature.innerText = Math.round(data.main.temp) + "°C";
                    description.innerText = data.weather[0].description;
                    humidity.innerText = data.main.humidity + "%";
                    wind.innerText = data.wind.speed + " km/h";
                } else {
                    cityName.innerText = "City not found!";
                    weatherContent.style.display = 'none';
                }
            } catch (error) {
                cityName.innerText = "Error fetching data!";
                console.error(error);
            }
        }
    </script>
</body>
</html>
